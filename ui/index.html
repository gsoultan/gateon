<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/gateon-favicon.svg" />
    <title>Gateon</title>
    <script nonce="NONCE_PLACEHOLDER">
      // Pre-load theme to prevent flash of unstyled content (FOUC)
      try {
        const saved = localStorage.getItem('mantine-color-scheme-value');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-mantine-color-scheme', theme);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" nonce="NONCE_PLACEHOLDER"></script>
  </body>
</html>
