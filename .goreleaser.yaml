version: 2

project_name: gateon

before:
  hooks:
    - go mod download

builds:
  - id: gateon
    main: ./cmd/gateon
    binary: gateon
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - packaging/gateon-service.xml
    wrap_in_directory: true

nfpms:
  - id: default
    package_name: gateon
    bindir: /usr/bin
    formats:
      - deb
      - rpm
    description: Gateon - API Gateway and Reverse Proxy
    vendor: Gateon
    maintainer: Gembit Soultan Shirazi <https://github.com/gsoultan/gateon>
    homepage: https://github.com/gsoultan/gateon
    contents:
      - src: packaging/gateon.service
        dst: /lib/systemd/system/gateon.service
      - dst: /etc/gateon
        type: dir
        file_info:
          mode: 0755
    scripts:
      postinstall: scripts/postinstall.sh
      postremove: scripts/postremove.sh

snapshot:
  version_template: "{{ .Tag }}-next"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
