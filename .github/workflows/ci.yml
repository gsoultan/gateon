name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      # The Linux build compiles internal/ebpf/manager_linux.go, which depends on
      # the bpf2go-generated loader; this toolchain lets `go generate` compile the
      # XDP C program and emit those bindings below.
      - name: Install eBPF build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev libelf-dev linux-libc-dev gcc-multilib

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install buf and proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/bufbuild/buf/cmd/buf@latest

      - name: Generate proto
        run: buf generate

      - name: Install UI deps
        run: bun install --cwd ui

      - name: Lint UI (accessibility gate)
        run: (cd ui && bun run lint)

      - name: Build UI
        run: |
          (cd ui && bun run build)
          go run ./scripts/sync_assets.go

      - name: Tidy
        run: go mod tidy

      # Compile the XDP/eBPF C program and regenerate the bpf2go bindings so the
      # Linux build (manager_linux.go) and tests can link loadGateon_ebpf().
      - name: Generate eBPF bindings
        run: go generate ./internal/ebpf/...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Benchmarks (allocs/perf regression check)
        run: go test -run '^$' -bench . -benchmem -benchtime 50000x ./pkg/proxy/ ./internal/telemetry/
