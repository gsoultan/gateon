syntax = "proto3";

package gateon.v1;

option go_package = "github.com/gateon/gateon/proto/gateon/v1;gateonv1";

service ApiService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc ListRoutes(ListRoutesRequest) returns (ListRoutesResponse);
  rpc UpdateRoute(UpdateRouteRequest) returns (UpdateRouteResponse);
  rpc DeleteRoute(DeleteRouteRequest) returns (DeleteRouteResponse);

  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc UpdateService(UpdateServiceRequest) returns (UpdateServiceResponse);
  rpc DeleteService(DeleteServiceRequest) returns (DeleteServiceResponse);

  rpc GetGlobalConfig(GetGlobalConfigRequest) returns (GlobalConfig);
  rpc UpdateGlobalConfig(UpdateGlobalConfigRequest) returns (UpdateGlobalConfigResponse);

  rpc ListEntryPoints(ListEntryPointsRequest) returns (ListEntryPointsResponse);
  rpc UpdateEntryPoint(UpdateEntryPointRequest) returns (UpdateEntryPointResponse);
  rpc DeleteEntryPoint(DeleteEntryPointRequest) returns (DeleteEntryPointResponse);

  rpc ListMiddlewares(ListMiddlewaresRequest) returns (ListMiddlewaresResponse);
  rpc UpdateMiddleware(UpdateMiddlewareRequest) returns (UpdateMiddlewareResponse);
  rpc DeleteMiddleware(DeleteMiddlewareRequest) returns (DeleteMiddlewareResponse);

  rpc ListTLSOptions(ListTLSOptionsRequest) returns (ListTLSOptionsResponse);
  rpc UpdateTLSOption(UpdateTLSOptionRequest) returns (UpdateTLSOptionResponse);
  rpc DeleteTLSOption(DeleteTLSOptionRequest) returns (DeleteTLSOptionResponse);

  rpc Login(LoginRequest) returns (LoginResponse);
  rpc IsSetupRequired(IsSetupRequiredRequest) returns (IsSetupRequiredResponse);
  rpc Setup(SetupRequest) returns (SetupResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

message ListMiddlewaresRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}
message ListMiddlewaresResponse {
  repeated Middleware middlewares = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}
message UpdateMiddlewareRequest {
  Middleware middleware = 1;
}
message UpdateMiddlewareResponse {
  bool success = 1;
}
message DeleteMiddlewareRequest {
  string id = 1;
}
message DeleteMiddlewareResponse {
  bool success = 1;
}

message ListTLSOptionsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}
message ListTLSOptionsResponse {
  repeated TLSOption tls_options = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}
message UpdateTLSOptionRequest {
  TLSOption tls_option = 1;
}
message UpdateTLSOptionResponse {
  bool success = 1;
}
message DeleteTLSOptionRequest {
  string id = 1;
}
message DeleteTLSOptionResponse {
  bool success = 1;
}

message TLSOption {
  string id = 1;
  string name = 2;
  string min_tls_version = 3; // "TLS1.0", "TLS1.1", "TLS1.2", "TLS1.3"
  string max_tls_version = 4;
  repeated string cipher_suites = 5; // Only effective for TLS 1.2 and below
  bool prefer_server_cipher_suites = 6;
  string client_auth_type = 7;
  bool sni_strict = 8;
  repeated string alpn_protocols = 9;
}

message Middleware {
  string id = 1;
  string name = 2;
  // Type of the middleware.
  // Supported types:
  // - "ratelimit": Config: requests_per_minute, burst, per_ip, per_tenant, storage
  // - "auth": Config: type (jwt/apikey), issuer, audience, secret
  // - "headers": Config: add_request_X, set_request_X, del_request_X, add_response_X, set_response_X, del_response_X
  // - "rewrite": Config: path, pattern, replacement, query_X
  // - "addprefix": Config: prefix
  // - "stripprefix": Config: prefixes (comma separated)
  // - "stripprefixregex": Config: regex
  // - "replacepath": Config: path
  // - "replacepathregex": Config: pattern, replacement
  // - "compress": No config needed
  // - "accesslog": Config: route_id
  // - "metrics": Config: route_id
  // - "errors": Config: status_codes (comma separated), page_404, page_500, etc.
  // - "retry": Config: attempts
  // - "cors": Config: allowed_origins, allowed_methods, allowed_headers, etc.
  // - "grpcweb": No config needed
  string type = 3;
  map<string, string> config = 4;
}

message ListEntryPointsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}
message ListEntryPointsResponse {
  repeated EntryPoint entry_points = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}
message UpdateEntryPointRequest {
  EntryPoint entry_point = 1;
}
message UpdateEntryPointResponse {
  bool success = 1;
}
message DeleteEntryPointRequest {
  string id = 1;
}
message DeleteEntryPointResponse {
  bool success = 1;
}

message EntryPoint {
  string id = 1;
  string name = 2;
  string address = 3; // e.g., ":80", "0.0.0.0:443"
  enum Type {
    HTTP = 0;
    GRPC = 1;
    TCP = 2;
    UDP = 3;
    HTTP2 = 4;
    HTTP3 = 5;
  }
  Type type = 4;
  enum Protocol {
    TCP_PROTO = 0;
    UDP_PROTO = 1;
  }
  Protocol protocol = 11;
  repeated Protocol protocols = 12;
  TlsConfig tls = 5;
  int32 read_timeout_ms = 7;
  int32 write_timeout_ms = 8;
  int32 max_connections = 9;
  bool access_log_enabled = 10;
}

message ListServicesRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}
message ListServicesResponse {
  repeated Service services = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}
message UpdateServiceRequest {
  Service service = 1;
}
message UpdateServiceResponse {
  bool success = 1;
}
message DeleteServiceRequest {
  string id = 1;
}
message DeleteServiceResponse {
  bool success = 1;
}

message Service {
  string id = 1;
  string name = 2;
  repeated Target weighted_targets = 3;
  string load_balancer_policy = 4; // "round_robin", "least_conn", "weighted_round_robin"
  string health_check_path = 5;
}

message GetGlobalConfigRequest {}

message UpdateGlobalConfigRequest {
  GlobalConfig config = 1;
}

message UpdateGlobalConfigResponse {
  bool success = 1;
}

message GlobalConfig {
  TlsConfig tls = 1;
  RedisConfig redis = 2;
  OtelConfig otel = 3;
  LogConfig log = 4;
  AuthConfig auth = 5;
}

message AuthConfig {
  bool enabled = 1;
  string paseto_secret = 2;
  string sqlite_path = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message IsSetupRequiredRequest {}
message IsSetupRequiredResponse {
  bool required = 1;
}

message SetupRequest {
  string admin_username = 1;
  string admin_password = 2;
  string paseto_secret = 3;
}

message SetupResponse {
  bool success = 1;
  string error = 2;
}

message LoginResponse {
  string token = 1;
  User user = 2;
}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}
message ListUsersResponse {
  repeated User users = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message UpdateUserRequest {
  User user = 1;
}

message UpdateUserResponse {
  bool success = 1;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}

message User {
  string id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
}

message TlsConfig {
  bool enabled = 1;
  string email = 2;
  repeated string domains = 3;
  bool auto_redirect = 6;
  reserved 4, 5, 7;
  string min_tls_version = 8; // "TLS1.0", "TLS1.1", "TLS1.2", "TLS1.3"
  string max_tls_version = 9;
  string client_auth_type = 10; // "NoClientCert", "RequestClientCert", "RequireAnyClientCert", "VerifyClientCertIfGiven", "RequireAndVerifyClientCert"
  repeated string cipher_suites = 11;
  repeated Certificate certificates = 12;
  repeated ClientAuthority client_authorities = 13;
  AcmeConfig acme = 14;
}

message AcmeConfig {
  bool enabled = 1;
  string email = 2;
  string ca_server = 3; // e.g. https://acme-v02.api.letsencrypt.org/directory
  string challenge_type = 4; // "http", "tls-alpn", "dns"
  string dns_provider = 5; // e.g. "cloudflare", "digitalocean" (for DNS-01)
  map<string, string> dns_config = 6;
}

message Certificate {
  string id = 1;
  string name = 2;
  string cert_file = 3;
  string key_file = 4;
}

message ClientAuthority {
  string id = 1;
  string name = 2;
  string ca_file = 3;
}

message RedisConfig {
  bool enabled = 4;
  string addr = 1;
  string password = 2;
  int32 db = 3;
}

message OtelConfig {
  bool enabled = 2;
  string endpoint = 1;
  string service_name = 3;
}

message LogConfig {
  string level = 1; // "debug", "info", "warn", "error"
  bool development = 2;
  string format = 3; // "json", "text"
  int32 path_stats_retention_days = 4;
}

message GetStatusRequest {}

message GetStatusResponse {
  string status = 1;
  string version = 2;
  int64 uptime = 3;
  int64 memory_usage = 4;
  int32 routes_count = 5;
  int32 services_count = 6;
}

message Target {
  string url = 1;
  int32 weight = 2; // For weighted load balancing
}

message ListRoutesRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}
message ListRoutesResponse {
  repeated Route routes = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message UpdateRouteRequest {
  Route route = 1;
}
message UpdateRouteResponse {
  bool success = 1;
}

message DeleteRouteRequest {
  string id = 1;
}
message DeleteRouteResponse {
  bool success = 1;
}

message Route {
  string id = 1;
  string name = 2;
  string type = 3; // "http", "grpc"
  repeated string entrypoints = 4;
  string rule = 5;
  int32 priority = 6;
  repeated string middlewares = 7;
  string service_id = 8;
  RouteTLSConfig tls = 9;
}

message RouteTLSConfig {
  repeated string certificate_ids = 1;
  string option_id = 2;
}
