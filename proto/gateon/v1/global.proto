syntax = "proto3";

package gateon.v1;

option go_package = "github.com/gsoultan/gateon/proto/gateon/v1;gateonv1";

import "gateon/v1/common.proto";

message GetGlobalConfigRequest {}

message GetGlobalConfigResponse {
  GlobalConfig config = 1;
}

message UpdateGlobalConfigRequest {
  GlobalConfig config = 1;
}

message UpdateGlobalConfigResponse {
  bool success = 1;
}

message GlobalConfig {
  TlsConfig tls = 1;
  RedisConfig redis = 2;
  OtelConfig otel = 3;
  LogConfig log = 4;
  AuthConfig auth = 5;
  TransportConfig transport = 6;
  WafConfig waf = 7;
  HaConfig ha = 8;
  AnomalyDetectionConfig anomaly_detection = 9;
  EbpfConfig ebpf = 10;
  reserved 11;
  ManagementConfig management = 12;
  GeoIPConfig geoip = 13;
  DebuggerConfig debugger = 14;
  SecurityAdvancedConfig security_advanced = 15;
  AlertingConfig alerting = 16;
  AuditConfig audit = 17;
  RBACConfig rbac = 18;
  // Resource profile preset: "minimal" | "standard" | "enterprise" (empty =>
  // "standard"). Sizes heavy subsystems (correlation engine, telemetry sketches,
  // trace store, retention, WAF tier) for the deployment's footprint without
  // removing capabilities. Overridable per-subsystem and by the GATEON_PROFILE env.
  string profile = 19;
}

message AlertingConfig {
  bool enabled = 1;
  repeated AlertDispatcher dispatchers = 2;
  repeated AlertPlaybook playbooks = 3;
}

message AlertDispatcher {
  string id = 1;
  string name = 2;
  string type = 3; // "slack", "discord", "webhook", "telegram"
  string webhook_url = 4;
  string slack_channel = 5;
  string telegram_bot_token = 6;
  string telegram_chat_id = 7;
}

message AlertPlaybook {
  string id = 1;
  string name = 2;
  string event_type = 3; // "waf_threat", "high_anomaly", "impossible_travel", "auth_failure"
  double threshold = 4;
  repeated string dispatcher_ids = 5;
  string action = 6; // "notify", "block", "challenge"
}

message AuditConfig {
  bool enabled = 1;
  bool sign_entries = 2;
  string signature_key = 3;
  // Optional dedicated database for audit/logging storage. When unset, the
  // auth/management database is reused. database_url takes precedence over
  // database_config.
  string database_url = 4;             // sqlite:path, postgres://..., mysql://...
  DatabaseConfig database_config = 5;
}

message SecurityAdvancedConfig {
  DeceptionConfig deception = 1;
  TarpitConfig tarpit = 2;
  EntropyConfig entropy = 3;
  BehavioralConfig behavioral = 4;
  PowConfig pow = 5;
  IPReputationConfig ip_reputation = 6;
  TlsBindingConfig tls_binding = 7;
}

message IPReputationConfig {
  bool enabled = 1;
  repeated string feed_urls = 2;
  int32 update_interval_hours = 3;
  double block_threshold = 4;
}

message DeceptionConfig {
  bool enabled = 1;
  repeated string honeypot_paths = 2;
  bool inject_invisible_links = 3;
  repeated string invisible_link_paths = 4;
  repeated string honey_forms = 5;
  string canary_header = 6;
  string canary_token = 7;
  bool enable_troll_response = 8;
}

message TlsBindingConfig {
  bool enabled = 1;
  string cookie_name = 2;
}

message TarpitConfig {
  bool enabled = 1;
  int32 delay_base_ms = 2;
  int32 delay_max_ms = 3;
  double score_threshold = 4;
}

message EntropyConfig {
  bool enabled = 1;
  double threshold = 2;
}

message BehavioralConfig {
  bool enabled = 1;
  bool enable_impossible_travel = 2;
  bool enable_sequence_validation = 3;
}

message PowConfig {
  bool enabled = 1;
  int32 difficulty = 2;
  double score_threshold = 3;
  string secret = 4;
}

message DebuggerConfig {
  bool enabled = 1;
  int32 max_captures = 2; // Maximum number of requests to keep in memory
  int32 max_body_size = 3; // Maximum body size to capture in bytes
}

message GeoIPConfig {
  bool enabled = 1;
  string db_path = 2;
  string maxmind_license_key = 3;
  bool auto_update = 4;
  int32 update_interval_days = 5;
  // BlockedCountries is a list of ISO country codes to block.
  repeated string blocked_countries = 6;
  // AllowedCountries is a list of ISO country codes to allow.
  repeated string allowed_countries = 8;
  // XdpGeofencing, if true, uses eBPF/XDP to block countries at the kernel level.
  bool xdp_geofencing = 7;
  // AsnDbPath is the path to the GeoLite2-ASN.mmdb database used to resolve the
  // autonomous system (ASN) of attacking IPs. Optional; defaults to
  // geoip/GeoLite2-ASN.mmdb when present.
  string asn_db_path = 9;
  // CountryDbPath is the path to the optional GeoLite2-Country.mmdb database
  // used as an additional geolocation fallback.
  string country_db_path = 10;
}

// ManagementConfig holds the configuration for the Gateon management server.
message ManagementConfig {
  // Bind specifies the address to listen on. It can be an IP (e.g., "0.0.0.0") 
  // or a hostname (e.g., "admin.example.com").
  // If a hostname is provided, it is also used for host-based filtering.
  string bind = 1;
  // Port specifies the TCP port to listen on.
  string port = 2;
  // AllowedIps is a whitelist of client IPs or CIDRs allowed to access the management API.
  repeated string allowed_ips = 3;
  // Cors defines the CORS configuration for the management API.
  CorsConfig cors = 4;
  // AllowPublicManagement, if true, enables access to the management API and dashboard 
  // on all entrypoints, not just the dedicated management port.
  // Defaults to false for security.
  bool allow_public_management = 6;
  // AllowedHosts is a whitelist of hostnames (e.g., ["admin.example.com"]) 
  // allowed to access the management API on public entrypoints.
  repeated string allowed_hosts = 7;
  // XdpManagementWhitelisting, if true, uses eBPF/XDP to drop management traffic 
  // from non-whitelisted IPs at the kernel level.
  bool xdp_management_whitelisting = 8;
  // EnablePortKnocking, if true, enables a stealth mode for the management port.
  bool enable_port_knocking = 9;
  // PortKnockingSequence is the sequence of ports to "knock" on to open management.
  repeated int32 port_knocking_sequence = 10;
  // GitOps config for configuration synchronization
  GitOpsConfig gitops = 11;

  reserved 5;
  reserved "host";
}

message CorsConfig {
  repeated string allowed_origins = 1;
  repeated string allowed_methods = 2;
  repeated string allowed_headers = 3;
  repeated string exposed_headers = 4;
  bool allow_credentials = 5;
  int32 max_age = 6;
}

message GitOpsConfig {
  bool enabled = 1;
  string repository_url = 2;
  string branch = 3;
  string path = 4;
  int32 sync_interval_seconds = 5;
  string ssh_private_key = 6;
  string auth_token = 7;
}

message RBACConfig {
  bool enabled = 1;
  repeated RolePolicy roles = 2;
}

message RolePolicy {
  string role = 1;
  repeated Permission permissions = 2;
}

message Permission {
  string resource = 1; // "routes", "services", etc.
  string action = 2;   // "read", "write"
}

message WafConfig {
  bool enabled = 1;
  bool use_crs = 2;
  int32 paranoia_level = 3;
  string custom_directives = 4;
  // Protection categories
  bool sqli = 5;
  bool xss = 6;
  bool lfi = 7;
  bool rce = 8;
  bool php = 9;
  bool scanner = 10;
  bool protocol = 11;
  bool java = 12;
  bool nodejs = 14;
  bool wordpress = 15;
  bool ip_reputation = 16;
  bool dos_protection = 17;
  bool malware_detection = 18;
  bool ransomware_detection = 20;
  bool dlp = 21;
  int32 anomaly_threshold = 19;
  int32 request_body_limit = 22;
  int32 response_body_limit = 23;
  string audit_log_path = 24;
  bool audit_log_relevant_only = 25;
  BotManagementConfig bot_management = 13;
  repeated string allowed_admin_ips = 26;
  bool auto_update_rules = 27;
  int32 update_interval_hours = 28;
  string rules_url = 29;
  string clamav_addr = 30; // Deprecated: use clamav.clamav_addr
  ClamavConfig clamav = 31;
  double entropy_threshold = 32;
  bool disable_entropy = 33;
  // Rule/inspection tier: "minimal" | "standard" | "enterprise" (empty =>
  // inherit the global profile). minimal = protocol+SQLi+XSS at PL1; standard =
  // full request-phase CRS; enterprise also enables response-phase (DLP) rules,
  // which buffer responses and cost the most CPU/latency/memory.
  string tier = 34;
}

message ClamavConfig {
  enum InstallationMode {
    INSTALLATION_MODE_UNSPECIFIED = 0;
    INSTALLATION_MODE_LOCAL = 1;
    INSTALLATION_MODE_DOCKER = 2;
  }
  InstallationMode installation_mode = 1;
  bool auto_install = 2;
  string docker_image = 3;
  string full_scan_schedule = 4; // Cron expression
  bool low_resource_mode = 5;
  string clamav_addr = 6;
  string database_update_schedule = 7; // Cron expression
  string app_update_schedule = 8;      // Cron expression
}

message BotManagementConfig {
  bool enabled = 1;
  bool enable_js_challenge = 2;
  bool enable_browser_integrity = 5;
  int32 challenge_timeout_seconds = 3;
  string secret_key = 4;
}

message HaConfig {
  bool enabled = 1;
  string interface = 2;
  int32 virtual_router_id = 3;
  int32 priority = 4;
  repeated string virtual_ips = 5;
  int32 advert_int = 6;
  string auth_pass = 7;
  bool enable_gossip = 8;
  string gossip_bind_addr = 9;
  int32 gossip_bind_port = 10;
  repeated string gossip_peers = 11;
}

message AnomalyDetectionConfig {
  bool enabled = 1;
  string prometheus_url = 2;
  int32 check_interval_seconds = 3;
  double sensitivity = 4;
  double security_threat_threshold = 5;
  int32 anomaly_retention_days = 6;
  bool enable_behavioral_fingerprinting = 7;
  bool enable_brute_force_detection = 8;
  bool enable_exploit_detection = 9;
}

message EbpfConfig {
  bool enabled = 1;
  bool xdp_rate_limit = 2;
  bool tc_filtering = 3;
  string interface = 4;
  bool xdp_ip_shunning = 5;
  bool xdp_load_balancing = 6;
  bool enable_knocking = 7;
  int32 mgmt_port = 8;
  repeated int32 knocking_sequence = 9;
}

message AuthConfig {
  bool enabled = 1;
  string paseto_secret = 2;
  string sqlite_path = 3;      // Deprecated: use database_config or database_url
  string database_url = 4;     // Fallback: sqlite:path, postgres://..., mysql://...
  DatabaseConfig database_config = 5;
  OidcConfig oidc = 6;
}

message OidcConfig {
  bool enabled = 1;
  string issuer = 2;
  string client_id = 3;
  string client_secret = 4;
  repeated string scopes = 5;
  string redirect_url = 6;
}
