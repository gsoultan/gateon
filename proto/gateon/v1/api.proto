syntax = "proto3";

package gateon.v1;

option go_package = "github.com/gsoultan/gateon/proto/gateon/v1;gateonv1";

import "gateon/v1/status.proto";
import "gateon/v1/route.proto";
import "gateon/v1/service.proto";
import "gateon/v1/global.proto";
import "gateon/v1/entrypoint.proto";
import "gateon/v1/middleware.proto";
import "gateon/v1/tls.proto";
import "gateon/v1/auth.proto";
import "gateon/v1/trace.proto";
import "gateon/v1/diagnostics.proto";
import "gateon/v1/audit.proto";

service ApiService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc ListTraces(ListTracesRequest) returns (ListTracesResponse);
  rpc ListRoutes(ListRoutesRequest) returns (ListRoutesResponse);
  rpc UpdateRoute(UpdateRouteRequest) returns (UpdateRouteResponse);
  rpc DeleteRoute(DeleteRouteRequest) returns (DeleteRouteResponse);

  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc UpdateService(UpdateServiceRequest) returns (UpdateServiceResponse);
  rpc DeleteService(DeleteServiceRequest) returns (DeleteServiceResponse);
  rpc DiscoverGrpcServices(DiscoverGrpcServicesRequest) returns (DiscoverGrpcServicesResponse);
  rpc GetGlobalConfig(GetGlobalConfigRequest) returns (GetGlobalConfigResponse);
  rpc UpdateGlobalConfig(UpdateGlobalConfigRequest) returns (UpdateGlobalConfigResponse);

  rpc ListEntryPoints(ListEntryPointsRequest) returns (ListEntryPointsResponse);
  rpc UpdateEntryPoint(UpdateEntryPointRequest) returns (UpdateEntryPointResponse);
  rpc DeleteEntryPoint(DeleteEntryPointRequest) returns (DeleteEntryPointResponse);

  rpc ListMiddlewares(ListMiddlewaresRequest) returns (ListMiddlewaresResponse);
  rpc UpdateMiddleware(UpdateMiddlewareRequest) returns (UpdateMiddlewareResponse);
  rpc DeleteMiddleware(DeleteMiddlewareRequest) returns (DeleteMiddlewareResponse);
  rpc GetCloudflareIPs(GetCloudflareIPsRequest) returns (GetCloudflareIPsResponse);

  rpc ListTLSOptions(ListTLSOptionsRequest) returns (ListTLSOptionsResponse);
  rpc UpdateTLSOption(UpdateTLSOptionRequest) returns (UpdateTLSOptionResponse);
  rpc DeleteTLSOption(DeleteTLSOptionRequest) returns (DeleteTLSOptionResponse);

  rpc Login(LoginRequest) returns (LoginResponse);
  rpc IsSetupRequired(IsSetupRequiredRequest) returns (IsSetupRequiredResponse);
  rpc Setup(SetupRequest) returns (SetupResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  rpc GetDiagnostics(GetDiagnosticsRequest) returns (GetDiagnosticsResponse);
  rpc ListSecurityThreats(ListSecurityThreatsRequest) returns (ListSecurityThreatsResponse);
  rpc RemoveMitigatedThreat(RemoveMitigatedThreatRequest) returns (RemoveMitigatedThreatResponse);
  rpc ListReputations(ListReputationsRequest) returns (ListReputationsResponse);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
  rpc ApplyRecommendation(ApplyRecommendationRequest) returns (ApplyRecommendationResponse);
  rpc TriggerWafUpdate(TriggerWafUpdateRequest) returns (TriggerWafUpdateResponse);
  rpc TraceRoute(TraceRouteRequest) returns (TraceRouteResponse);
  rpc ValidateCORS(ValidateCORSRequest) returns (ValidateCORSResponse);
  rpc InstallClamav(InstallClamavRequest) returns (InstallClamavResponse);
  rpc UninstallClamav(UninstallClamavRequest) returns (UninstallClamavResponse);
  rpc RunDeepScan(RunDeepScanRequest) returns (RunDeepScanResponse);
}

message RunDeepScanRequest {}

message RunDeepScanResponse {
  bool success = 1;
  string message = 2;
  DeepScanStatus status = 3;
}

message DeepScanStatus {
  bool is_running = 1;
  string last_scan = 2;
  string last_error = 3;
  string last_result = 4;
}

message InstallClamavRequest {
  ClamavConfig.InstallationMode mode = 1;
}

message InstallClamavResponse {
  bool success = 1;
  string message = 2;
}

message UninstallClamavRequest {}

message UninstallClamavResponse {
  bool success = 1;
  string message = 2;
}
