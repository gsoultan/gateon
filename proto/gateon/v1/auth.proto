syntax = "proto3";

package gateon.v1;

option go_package = "github.com/gateon/gateon/proto/gateon/v1;gateonv1";

message LoginRequest {
  string username = 1;
  string password = 2;
}

message IsSetupRequiredRequest {}

message IsSetupRequiredResponse {
  bool required = 1;
}

message SetupRequest {
  string admin_username = 1;
  string admin_password = 2;
  string paseto_secret = 3;
}

message SetupResponse {
  bool success = 1;
  string error = 2;
}

message LoginResponse {
  string token = 1;
  User user = 2;
}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message UpdateUserRequest {
  User user = 1;
}

message UpdateUserResponse {
  bool success = 1;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}

message ChangePasswordRequest {
  string id = 1;
  string password = 2;
}

message ChangePasswordResponse {
  bool success = 1;
}

message User {
  string id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
}
