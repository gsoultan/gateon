syntax = "proto3";

package gateon.v1;

option go_package = "github.com/gsoultan/gateon/proto/gateon/v1;gateonv1";

import "gateon/v1/common.proto";

message LoginRequest {
  string username = 1;
  string password = 2;
}

message IsSetupRequiredRequest {}

message IsSetupRequiredResponse {
  bool required = 1;
}

// SetupRequest is the initial configuration request to initialize the Gateon server.
message SetupRequest {
  // AdminUsername is the username for the first administrator account.
  string admin_username = 1;
  // AdminPassword is the password for the first administrator account.
  string admin_password = 2;
  // PasetoSecret is the 32-character secret key for signing PASETO tokens.
  string paseto_secret = 3;
  // ManagementBind is the initial bind address for the management API.
  string management_bind = 4;
  // ManagementPort is the initial port for the management API.
  string management_port = 5;
  reserved 6;
  reserved "management_host";

  // DatabaseUrl is an optional connection string for the management/auth database.
  // If provided, it overrides DatabaseConfig.
  // Supported: plain sqlite path (e.g. "gateon.db"),
  //            sqlite://path/to.db, postgres://..., mysql://...
  string database_url = 7;

  // DatabaseConfig is an optional structured database configuration.
  // When DatabaseUrl is empty, this config is used to construct the DSN.
  DatabaseConfig database_config = 8;
}

message SetupResponse {
  bool success = 1;
  string error = 2;
}

message LoginResponse {
  string token = 1;
  User user = 2;
  bool two_factor_required = 3;
  // two_factor_setup_required is true when an administrator has mandated 2FA for
  // this account but the user has not yet enrolled. The client must walk the user
  // through first-time TOTP enrollment before a session is issued.
  bool two_factor_setup_required = 4;
}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message UpdateUserRequest {
  User user = 1;
}

message UpdateUserResponse {
  bool success = 1;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}

message ChangePasswordRequest {
  string id = 1;
  string password = 2;
}

message ChangePasswordResponse {
  bool success = 1;
}

message User {
  string id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
  bool two_factor_enabled = 5;
  string two_factor_secret = 6;
  repeated string recovery_codes = 7;
  // disabled, when true, blocks the account from logging in without deleting it.
  bool disabled = 8;
  // two_factor_pending, when true, marks 2FA as mandated by an administrator but
  // not yet enrolled by the user. The TOTP secret is generated by the user during
  // self-service enrollment, never by the admin.
  bool two_factor_pending = 9;
}

message Setup2FARequest {
  string id = 1;
}

message Setup2FAResponse {
  string secret = 1;
  string qr_code_url = 2;
  repeated string recovery_codes = 3;
}

message Verify2FARequest {
  string id = 1;
  string code = 2;
}

message Verify2FAResponse {
  bool success = 1;
  string token = 2;
  User user = 3;
}
