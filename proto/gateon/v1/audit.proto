syntax = "proto3";

package gateon.v1;

option go_package = "github.com/gsoultan/gateon/proto/gateon/v1;gateonv1";

message AuditLog {
  string id = 1;
  string user_id = 2;
  string action = 3;
  string resource = 4;
  string details = 5;
  string timestamp = 6;
  string ip_address = 7;
  string signature = 8;
}

message ListAuditLogsRequest {
  int32 limit = 1;
  int32 page = 2;
  int32 page_size = 3;
  string search = 4;
}

message ListAuditLogsResponse {
  repeated AuditLog logs = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListAuditArchivesRequest {}

message ListAuditArchivesResponse {
  repeated AuditArchive archives = 1;
}

message AuditArchive {
  string filename = 1;
  int64 size = 2;
  string created_at = 3;
}

message GetAuditArchiveRequest {
  string filename = 1;
}

message GetAuditArchiveResponse {
  repeated AuditLog logs = 1;
}
