syntax = "proto3";

package gateon.v1;

option go_package = "github.com/gsoultan/gateon/proto/gateon/v1;gateonv1";

message Trace {
  string id = 1;
  string operation_name = 2;
  string service_name = 3;
  double duration_ms = 4;
  string timestamp = 5;
  string status = 6;
  string path = 7;
  string source_ip = 8;
  string user_agent = 9;
  string method = 10;
  string referer = 11;
  string request_uri = 12;
}

message ListTracesRequest {
  int32 limit = 1;
}

message ListTracesResponse {
  repeated Trace traces = 1;
}
