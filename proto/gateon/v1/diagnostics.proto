syntax = "proto3";

package gateon.v1;

option go_package = "github.com/gsoultan/gateon/proto/gateon/v1;gateonv1";


message GetDiagnosticsRequest {}

message GetDiagnosticsResponse {
  repeated EntryPointDiagnostic entrypoints = 1;
  repeated HandshakeError recent_tls_errors = 2;
  SystemInfo system = 3;
  repeated Anomaly anomalies = 4;
  repeated DependencyHealth dependencies = 5;
}

message Anomaly {
  string type = 1;
  string severity = 2;
  string description = 3;
  string timestamp = 4;
  string source = 5;
  string recommendation = 6;
  double latitude = 7;
  double longitude = 8;
  string country_code = 9;
  double score = 10;
  string ja3 = 11;
  string ja4 = 33;
  string route_id = 12;
  string request_uri = 13;
  bool mitigated = 14;
  string category = 15;
  string action_taken = 16;
  bool cluster_synced = 17;
  string request_headers = 18;
  string request_body = 19;
  string response_headers = 20;
  string response_body = 21;
  string user_agent = 22;
  string http_method = 23;
  double confidence = 24;
  double entropy = 25;
  int32 cluster_size = 26;
}

message GossipStatus {
  bool enabled = 1;
  int32 members_count = 2;
  repeated string member_names = 3;
  int64 messages_sent = 4;
  int64 messages_received = 5;
}

message ReputationSyncPayload {
  string fingerprint = 1;
  double score = 2;
  int32 violation_count = 3;
  repeated string history = 4;
}

message ListSecurityThreatsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListSecurityThreatsResponse {
  repeated Anomaly threats = 1;
}

message ListReputationsRequest {
  int32 limit = 1;
}

message ListReputationsResponse {
  repeated Reputation reputations = 1;
}

message Reputation {
  string fingerprint = 1;
  double score = 2;
  string last_event = 3;
  int32 violation_count = 4;
  repeated string history = 5;
}

message DependencyHealth {
  string name = 1;
  bool healthy = 2;
  string error = 3;
  string latency_ms = 4;
}

message ApplyRecommendationRequest {
  string anomaly_type = 1;
  string source = 2;
  string threat_id = 3;
}

message ApplyRecommendationResponse {
  bool success = 1;
  string message = 2;
}

message RemoveMitigatedThreatRequest {
  string source = 1;
}

message RemoveMitigatedThreatResponse {
  bool success = 1;
  string message = 2;
}

message TraceRouteRequest {
  string ip = 1;
}

message TraceRouteResponse {
  repeated TraceHop hops = 1;
}

message TriggerWafUpdateRequest {}

message TriggerWafUpdateResponse {
  bool success = 1;
  string message = 2;
}

message ValidateCORSRequest {
  string url = 1;
  string origin = 2;
  string method = 3;
  map<string, string> headers = 4;
  string auth_bearer_token = 5;
}

message ValidateCORSResponse {
  bool is_allowed = 1;
  string message = 2;
  map<string, string> response_headers = 3;
  repeated string checks = 4;
  bool is_preflight = 5;
  map<string, string> middleware_config = 6;
  string route_name = 7;
  repeated string suggestions = 8;
  string route_id = 9;
}

message TraceHop {
  int32 hop = 1;
  string ip = 2;
  double latitude = 3;
  double longitude = 4;
  string country_code = 5;
  string city = 6;
  int64 rtt_ms = 7;
}

message EntryPointDiagnostic {
  string id = 1;
  string address = 2;
  string type = 3;
  bool listening = 4;
  int64 total_connections = 5;
  int64 active_connections = 6;
  string last_error = 7;
  repeated CertificateStatus certificates = 8;
  string name = 9;
  repeated RouteDiagnostic routes = 10;
}

message RouteDiagnostic {
  string id = 1;
  string name = 2;
  string rule = 3;
  string service_id = 4;
  string service_name = 5;
  bool service_healthy = 6;
  repeated MiddlewareDiagnostic middlewares = 7;
  bool healthy = 8;
  string error = 9;
}

message MiddlewareDiagnostic {
  string id = 1;
  string name = 2;
  string type = 3;
  bool healthy = 4;
  string error = 5;
}

message CertificateStatus {
  string domain = 1;
  string expiry = 2;
  bool valid = 3;
  string error = 4;
  string issuer = 5;
}

message HandshakeError {
  string timestamp = 1;
  string remote_addr = 2;
  string error = 3;
  string entrypoint_id = 4;
  string entrypoint_name = 5;
}

message SystemInfo {
  string public_ip = 1;
  bool cloudflare_reachable = 2;
  string uptime = 3;
  int64 goroutines = 4;
  string memory_usage = 5;
  string cpu_usage = 6;
  string version = 7;
  GossipStatus gossip = 8;
  EbpfStats ebpf = 9;
}

message EbpfStats {
  bool enabled = 1;
  int32 shunned_ips_count = 2;
  map<string, uint64> dropped_packets = 3;
}
